version: '3.8'

services:
  studer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studer
    ports:
      - "2020:2020"
    volumes:
      # Persist the SQLite database across container restarts
      - studer-data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/studer.db
      - NODE_ENV=production
      - PORT=2020
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2020/api/progress"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  studer-data:
    driver: local
